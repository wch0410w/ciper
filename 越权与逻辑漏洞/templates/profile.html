{% extends "base.html" %}
{% block content %}
{% if user %}
    <div class="card">
        <h2>个人中心</h2>
        <div class="user-info">
            <h3>用户资料</h3>
            <ul class="info-list">
                <li><span class="label">ID：</span>{{ user.id }}</li>
                <li><span class="label">用户名：</span>{{ user.username }}</li>
                <li><span class="label">邮箱：</span>{{ user.email }}</li>
                <li><span class="label">手机：</span>{{ user.phone }}</li>
                <li><span class="label">角色：</span>{{ user.role }}</li>
                <li><span class="label">余额：</span>{{ user.balance }}</li>
            </ul>
        </div>
    </div>

    <div class="card">
        <h2>充值</h2>
        <form method="post" action="/recharge" class="login-form">
            <input type="hidden" name="user_id" value="{{ user.id }}">
            <div class="form-group">
                <label for="amount">充值金额</label>
                <input type="number" id="amount" name="amount" placeholder="请输入充值金额" step="0.01" required>
            </div>
            <button type="submit" class="btn btn-primary">充值</button>
        </form>
    </div>
{% else %}
    <div class="card">
        <h2>未找到用户</h2>
        <p>请检查用户ID是否正确。</p>
        <a href="/" class="btn btn-primary">返回首页</a>
    </div>
{% endif %}
{% endblock %}
