{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:500px;margin:0 auto;">
    <h2>上传头像</h2>
    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/upload" enctype="multipart/form-data" class="login-form">
        <div class="form-group">
            <label for="file">选择头像图片</label>
            <input type="file" id="file" name="file" required>
        </div>
        <button type="submit" class="btn btn-primary">上传</button>
    </form>

    {% if url %}
        <div style="margin-top:24px;text-align:center;">
            <h3>上传成功！</h3>
            <img src="{{ url }}" alt="头像预览" style="max-width:200px;max-height:200px;border-radius:50%;margin:16px 0;border:3px solid #667eea;">
            <p><a href="{{ url }}" target="_blank" style="color:#667eea;">{{ url }}</a></p>
        </div>
    {% endif %}
</div>
{% endblock %}
